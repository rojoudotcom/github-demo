name: Deploy to GitHub Pages

# Continuous deployment: once a change is merged to main, publish the static
# site to GitHub Pages. Only the files the browser needs are uploaded.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; do not cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble the site
        run: |
          mkdir -p public
          cp index.html public/
          cp -r src public/
          touch public/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
